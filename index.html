<!DOCTYPE html>
<html lang="en-us">
    <head>
        <title>ChromeBookGamers</title>
    </head>
    <body>
        <h1>ChromeBookGamers</h1>
        <h3>Upload an HTML file or choose a from the list below to start playing!</h3>
        <p>This website was created for chromebook users who don't want to waste performance on loading good-looking websites.</p>
        <p>Get game files <a href = "https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/edit?tab=t.0" target="_blank">here</a> if the one you want to play isn't listed.</p>
        <input type="file" id="fileInput" accept=".html,.htm">
        <script>
            document.getElementById("fileInput").addEventListener("change", async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const text = await file.text();
                const blob = new Blob([text], { type: "text/html" });
                const url = URL.createObjectURL(blob);

                window.open(url, "_blank");
            });
        </script>
    </body>
</html>
